<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pagamento Confirmado - Elena Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #f9f9f9; text-align: center; padding: 40px 20px; font-family: 'Montserrat', sans-serif; }
        .success-container { max-width: 450px; margin: 0 auto; background: #fff; padding: 40px 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .logo { max-height: 60px; margin-bottom: 30px; }
        .check-icon { font-size: 4rem; color: #00a85f; margin-bottom: 20px; display: block; }
        h1 { font-size: 1.8rem; color: #333; margin-bottom: 15px; }
        p { color: #555; font-size: 1rem; line-height: 1.6; margin-bottom: 30px; }
        .details-box { background: #f5f5f5; padding: 20px; border-radius: 8px; text-align: left; margin-bottom: 30px; }
        .details-box p { margin: 5px 0; font-size: 0.9rem; color: #444; }
        .btn-home { background: #333; color: #fff; text-decoration: none; padding: 15px 30px; border-radius: 6px; font-weight: 600; display: inline-block; transition: background 0.3s; width: 100%; box-sizing: border-box; }
        .btn-home:hover { background: #000; }
    </style>
</head>
<body>
    <img src="images/logo.png" alt="Elena Store" class="logo" onerror="this.style.display='none'">
    
    <div class="success-container">
        <span class="check-icon">✅</span>
        <h1>Pagamento Aprovado!</h1>
        <p>Muito obrigado pela sua compra! Seu pagamento foi confirmado com sucesso e sua peça já está sendo separada para envio.</p>
        
        <div class="details-box">
            <p><strong>Status:</strong> Preparando envio</p>
            <p><strong>Previsão:</strong> Você receberá o código de rastreio em seu WhatsApp e e-mail nos próximos dias.</p>
        </div>
        
        <a href="index.html" class="btn-home">Voltar para o Início</a>
    </div>
</body>
</html>
