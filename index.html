<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elena Store</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- Meta Pixel Code -->
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '1255725740021923');
    fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"

</head>

<body>
    <div class="container">
        <!-- Main Image -->
        <img src="images/giftbox.png" alt="Caixa de Presente" class="hero-image">

        <!-- Logo -->
        <img src="images/logo.png" alt="Elena Store" class="logo">

        <!-- Badge -->
        <div class="badge">
            <span class="dot"></span>
            VOCÊ É A 17ª CLIENTE DE 20 ESCOLHIDAS
        </div>

        <!-- Headers -->
        <h1 class="main-title">Parabéns!</h1>
        <p class="subtitle">Você ganhou uma peça</p>
        <h2 class="free-title">TOTALMENTE GRÁTIS</h2>

        <!-- Timer Section -->
        <div class="timer-section">
            <p class="timer-label">OFERTA EXPIRA EM</p>
            <div class="timer-display">
                <div class="time-block" id="minutes">14</div>
                <span class="separator">:</span>
                <div class="time-block" id="seconds">54</div>
            </div>
            <p class="warning-text">⚠️ Se você sair desta página, perderá a promoção</p>
        </div>

        <!-- CTA -->
        <button class="cta-button" onclick="window.location.href='colecao.html'">
            ESCOLHER MINHA PEÇA <span class="arrow">→</span>
        </button>
        <p class="footer-text">Restam apenas 3 peças disponíveis. Sem compromisso.</p>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
